  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .lower { background: #0F0F0F; padding: 36px 40px 40px; position: relative; }
    .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }

    .stamp::after { content: ''; position: absolute; width: 46px; height: 46px; border-radius: 50%; border: 0.8px solid #0F0F0F; }
    .meta-label { font-family: 'Barlow', Arial, sans-serif; font-size: 9px; color: #99998A; letter-spacing: 3px; text-transform: uppercase; padding-top: 6px; }
    .barcode { display: flex; gap: 0; align-items: flex-start; }
    .barcode span { display: inline-block; height: 48px; background: #0F0F0F; }
    .divider-line { width: 100%; height: 0.5px; background: #0F0F0F; opacity: 0.15; margin-bottom: 16px; }
    .logotype { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 900; font-size: clamp(72px, 14vw, 118px); line-height: 0.92; color: #0F0F0F; letter-spacing: -2px; margin-bottom: 20px; }
    .pill { display: inline-flex; align-items: center; background: #FF6B00; border-radius: 999px; height: 40px; overflow: hidden; position: relative; }
    .pill-glitch { display: flex; gap: 0; height: 40px; align-items: stretch; flex-shrink: 0; }
    .pill-glitch span { display: block; background: #0F0F0F; }
    .pill-text { font-family: 'Barlow Condensed', Arial, sans-serif; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 3px; text-transform: uppercase; padding: 0 24px 0 14px; white-space: nowrap; }
    .subtext { margin-top: 18px; display: flex; flex-direction: column; gap: 6px; }
    .subtext span { font-size: 11px; color: #55554A; letter-spacing: 1.5px; }
    .crosshair-zone { position: absolute; right: 40px; bottom: 60px; display: flex; align-items: center; gap: 16px; }
    .pill-link { display: inline-flex; align-items: center; background: #FF6B00; border-radius: 999px; height: 40px; padding: 0 28px; font-family: 'Barlow Condensed', Arial, sans-serif; font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; cursor: pointer; transition: opacity 0.15s; border: none; }
    .pill-link:hover { opacity: 0.85; }
    .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: end; margin-top: 32px; }
    .globe-box { border: 0.8px solid #444; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .globe-label { font-size: 9px; color: #666; letter-spacing: 2px; text-transform: uppercase; }
    .links-col { display: flex; flex-direction: column; gap: 12px; align-items: flex-end; }
    .find-me { font-size: 9px; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; text-align: right; }
    .reg-mark { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; margin-top: 20px; }
    .reg-h { width: 80px; height: 0.5px; background: #333; }
    .reg-v { width: 0.5px; height: 40px; background: #333; margin: 0 auto; }
    .reg-circle { width: 14px; height: 14px; border-radius: 50%; border: 0.8px solid #FF6B00; margin: 0 auto; }
    .reg-code { font-family: 'Courier New', monospace; font-size: 8px; color: #666; letter-spacing: 1px; }
    .star-wrap { display: flex; justify-content: center; align-items: center; padding: 10px 0 0; }
    @keyframes hueShift { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
